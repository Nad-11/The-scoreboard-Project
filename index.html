<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel=stylesheet href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=DynaPuff:wght@400..700&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="container">


        <div class="child-container">

            <h2>LOUFIE</h2>

            <div class="Thenumber-background">
                <div id="score-el">
                    0
                </div>
            </div>

            <div class="buttons-container">
                <button onclick="add1()"> + 1</button>
                <button onclick="add2()"> + 2</button>
                <button onclick="add3()"> + 3</button>
            </div>

        </div>


        <div class="child-container">

            <h2>NARUTO</h2>

            <div class="Thenumber-background">
                <div id="score-el2">
                    0
                </div>
            </div>

            <div class="buttons-container">
                <button onclick="add4()"> + 1</button>
                <button onclick="add5()"> + 2</button>
                <button onclick="add6()"> + 3</button>
            </div>

        </div>

        <div id="control-panel">

            <button class="management-btn" onclick="reset()"> Reset </button>
            <button class="management-btn" onclick="universalSubstractfunction()">Subtract</button>

        </div>


    </div>



    <script src="index.js"> </script>

</body>

</html>
